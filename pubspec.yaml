name: lifeos
description: "LifeOS — an offline-first personal operating system."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^3.0.0
  riverpod_annotation: ^4.0.0

  # Dependency injection
  get_it: ^8.0.3

  # Routing
  go_router: ^15.1.2

  # Local database (Drift — scaffolded, no tables yet in Module 1)
  drift: ^2.23.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1

  # Secure storage & lightweight prefs
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.5

  # Serialization
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Animation
  flutter_animate: ^4.5.2
  animations: ^2.0.11
  lottie: ^3.3.1

  # SVG
  flutter_svg: ^2.0.17

  # Biometrics
  local_auth: ^2.3.0

  # Date/time formatting
  intl: ^0.19.0

  # Notes markdown rendering (official flutter_markdown is discontinued;
  # this is the maintained community fork)
  flutter_markdown_plus: ^1.0.12

  # Notes sharing (Phase 2B). Pinned below 13.1.0 — newer share_plus
  # requires win32 ^6.0.1, which conflicts with flutter_secure_storage
  # 9.2.4's win32 ^5.0.0 constraint. Revisit once flutter_secure_storage
  # bumps its win32 floor.
  share_plus: ^12.0.2

  # Real Android-first notification scheduling for Reminders (core/services/
  # NotificationScheduler's LocalNotificationScheduler implementation).
  flutter_local_notifications: ^19.4.2
  timezone: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  build_runner: ^2.4.14
  riverpod_generator: ^4.0.0
  drift_dev: ^2.23.1
  freezed: ^3.0.0
  json_serializable: ^6.9.0

  # Only for the schema-migration test, which seeds a raw v1 database
  # ahead of AppDatabase's own onUpgrade path.
  sqlite3: ^2.9.0

flutter:
  uses-material-design: true

  assets:
    - assets/svg/home/
    - assets/svg/reminders/
    - assets/lottie/
    - assets/backgrounds/
    # NOTE: assets/svg/{health,finance,documents,common,avatars,illustrations}/
    # and assets/rive/ are scaffolded folders reserved for future modules — Flutter's
    # asset bundler errors on empty directories, so they're added to this list only once
    # they hold real files. See docs/future_work.md.
